name: 'ROOT Python wheels'

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch for which the Python wheel has to be generated'
        type: string
        required: true
        default: "experimental-pip-install-root"
  push:
    branches: experimental-pip-install-root
  schedule:
    - cron: '01 1 * * *'

jobs:
  cp38-manylinux_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.0.1
        env:
          CIBW_BUILD: cp38-manylinux_x86_64
      
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: cp38-manylinux_x86_64
          path: wheelhouse/*

  cp39-manylinux_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.0.1
        env:
          CIBW_BUILD: cp39-manylinux_x86_64
      
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: cp39-manylinux_x86_64
          path: wheelhouse/*

  cp310-manylinux_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.0.1
        env:
          CIBW_BUILD: cp310-manylinux_x86_64
      
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: cp310-manylinux_x86_64
          path: wheelhouse/*

  cp311-manylinux_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.0.1
        env:
          CIBW_BUILD: cp311-manylinux_x86_64
      
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: cp311-manylinux_x86_64
          path: wheelhouse/*

  cp312-manylinux_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.0.1
        env:
          CIBW_BUILD: cp312-manylinux_x86_64
      
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: cp312-manylinux_x86_64
          path: wheelhouse/*

  cp313-manylinux_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.0.1
        env:
          CIBW_BUILD: cp313-manylinux_x86_64
      
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: cp313-manylinux_x86_64
          path: wheelhouse/*

  create_and_upload_wheel_registry:
      needs: [cp38-manylinux_x86_64, cp39-manylinux_x86_64, cp310-manylinux_x86_64, cp311-manylinux_x86_64, cp312-manylinux_x86_64, cp313-manylinux_x86_64]
      runs-on: ubuntu-latest
      steps:

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cp38-manylinux_x86_64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cp39-manylinux_x86_64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cp310-manylinux_x86_64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cp311-manylinux_x86_64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cp312-manylinux_x86_64

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cp313-manylinux_x86_64

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install Kerberos utilities
        run: sudo apt-get install -y krb5-user

      - name: Install XRootD client
        run: sudo apt-get -y install xrootd-client

      - name: Create PEP503-compliant wheel registry
        run: |
          mkdir -p wheelhouse
          mv *.whl wheelhouse
          python -m pip install --upgrade pip
          python -m pip install --user simple503
          simple503 wheelhouse

      - name: Upload wheel registry to github
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-registry
          path: wheelhouse

      - name: Upload wheels to EOS
        env:
          RWEBEOS_KT: ${{ secrets.RWEBEOS_KT }}
          KT_FILE_NAME: /tmp/decoded.keytab
          EOS_PATH: /eos/project/r/root-eos/www/experimental-python-wheels
          EOS_ENDPOINT: root://eosproject-r.cern.ch
          KRB5CCNAME: /tmp/krb5cc
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo +++ Content
          ls
          echo +++ Retrieving the secret
          echo ${RWEBEOS_KT} | base64 -d > ${KT_FILE_NAME}
          echo +++ Creating the token
          kinit  -p ${{ secrets.KRB5USER }}@${{ secrets.KRB5REALM }} -kt ${KT_FILE_NAME}
          echo +++ Running the copy
          xrdcp -rf wheelhouse/* ${EOS_ENDPOINT}/${EOS_PATH}/
